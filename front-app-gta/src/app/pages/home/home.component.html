<section class="home-page">
  <div class="home-card" *ngIf="currentUser$ | async as user">
    <header class="home-header">
      <p class="session-badge">{{ user.email }}:{{ user.role }}</p>
      <button type="button" (click)="logout()">Se deconnecter</button>
    </header>

    <p class="eyebrow">Espace prive</p>
    <h1>Bienvenue {{ user.firstName }} {{ user.lastName }}</h1>
    <p class="subtitle">
      Vous etes connecte avec le role <strong>{{ user.role }}</strong>.
    </p>

    <dl class="details">
      <div>
        <dt>Email</dt>
        <dd>{{ user.email }}</dd>
      </div>
      <div>
        <dt>Matricule</dt>
        <dd>{{ user.employeeNumber }}</dd>
      </div>
      <div>
        <dt>Derniere connexion</dt>
        <dd>{{ user.lastLoginAt || 'Premiere connexion' }}</dd>
      </div>
    </dl>
  </div>
</section>
